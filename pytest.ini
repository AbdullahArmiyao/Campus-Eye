# ─────────────────────────────────────────────────────────────────────────────
# Campus Eye — pytest configuration
# ─────────────────────────────────────────────────────────────────────────────
[pytest]
# anyio drives async tests; asyncio_mode=auto prevents "no async backend" errors
asyncio_mode = auto
testpaths = tests
addopts = -v --tb=short
