version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: campus_eye_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-campus_eye}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campus_eye_secret}
      POSTGRES_DB: ${POSTGRES_DB:-campus_eye}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-campus_eye}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: campus_eye_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campus_eye_app
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
      - ./config.yaml:/app/config.yaml
      - ./models:/app/models          # cached model weights
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campus_eye_worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./media:/app/media
      - ./config.yaml:/app/config.yaml
      - ./models:/app/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.alerts.celery_app worker --loglevel=info --concurrency=4

volumes:
  postgres_data:
